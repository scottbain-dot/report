<script>
let ROWS = [];
const MODEL="claude-sonnet-4-6";
/* ====== VOICE BRAIN — edit this block to shift tone any time ====== */
const SYSTEM=`You write end-of-semester PE report comments for a Frankfurt International School teacher, Grade 9 (graded 1–7), addressed to parents.

VOICE: warm, personal, growth-minded. Situate the student, name specific evidence-based strengths and progress, give one honest area to develop framed as a concrete next step and why it matters, then close looking ahead to next semester. Encouraging but honest.

HARD RULES:
- Third person, addressed to parents. Refer to the student ONLY as the literal token [NAME]. Use the given pronouns.
- One point per sentence. No lists, no bullet points, no long comma-strings. Flowing prose, about 4–5 sentences — 5 maximum. Be concise; do not pad.
- Use ONLY the evidence, grade, strengths and areas provided. Never invent events, reasons, feelings or specifics. If evidence is thin, stay general rather than fabricate.
- The evidence is in date order (earliest to latest). The bracketed text after each rubric level is what that level actually means — use it to understand what was demonstrated, not just the number. Where the scores, levels or comments genuinely show improvement over time, you may reflect that growth; never claim progress the dates and evidence don't support.
- Never mention missed, late, incomplete, zero-scored or no-submission assignments, preparatory/planning tasks that weren't done, or any administrative or logistical note. Comment only on what the student actually demonstrated.
- No jargon; parent-friendly. Do not state grades, scores, rubric levels or numbers.
- Shape: situate/overall → 1–2 specific strengths or progress → one area + concrete action + why it matters → brief forward-looking close.

STYLE — the teacher's own phrasing tends to sound like: "Leadership could be what takes them to the next level in their development." / "I have really enjoyed getting to know them and look forward to their continued growth." / "They are capable of more than they sometimes give themselves credit for." Echo this warm, growth-minded register; do NOT copy these lines verbatim.

TASK: From the evidence, choose the strengths and the areas to improve that genuinely apply — selecting ONLY from the two lists given in the user message, using their exact wording. Then write the comment using the tags you chose, following every rule above.

Respond with ONLY a JSON object, no markdown and no fences. Begin your reply with { and end with } — no preamble, no explanation, no notes before or after.
{"strengths":["...","..."],"areas":["..."],"comment":"..."}
Choose 2–4 strengths and 1–2 areas. If the evidence is thin, choose fewer rather than guessing.`;
/* ================================================================= */
const STRENGTHS=["Hard working","Sets high standards","Fantastic mindset","Self-management","Competitive","Naturally athletic","Improvement in skills & fitness","Improvement in confidence","Tries hard no matter the situation","Good progress in self-management & focus","Teachable — wants to learn & improve","Grit / perseverance","Strong fundamental skills","Participates actively","Strong communicator","Leader","Great team member","Personable","Friendly"];
const AREAS=["Build fundamental skills & fitness","More consistent participation & effort","Capable of more than they realise","Looking to become a leader","Self-management, discipline & focus","Organisation","Push harder / more consistently","Social skills & teamwork","Grow as a leader — get the best from the team","Push regardless of situation; unafraid of mistakes","Set higher standards","Seek challenges outside the comfort zone"];
const STR_S={"Hard working":"{Name} brings a strong work ethic to physical education","Sets high standards":"{Name} sets high standards for {refl}","Fantastic mindset":"{Name} approaches every lesson with a fantastic mindset","Self-management":"{Name} manages {pos} learning well, arriving prepared and ready to work","Competitive":"{Name} brings a healthy competitive edge to activities","Naturally athletic":"{Name} is a naturally athletic and capable mover","Improvement in skills & fitness":"{Name} has made clear improvement in {pos} skills and fitness this semester","Improvement in confidence":"{Name} has grown noticeably in confidence this semester","Tries hard no matter the situation":"{Name} tries hard no matter the situation or activity","Good progress in self-management & focus":"{Name} has made good progress in self-management, focus and pushing {refl}","Teachable — wants to learn & improve":"{Name} is teachable and genuinely wants to learn and improve","Grit / perseverance":"{Name} shows real grit and perseverance","Strong fundamental skills":"{Name} demonstrates strong fundamental movement skills","Participates actively":"{Name} participates actively and gives full effort in lessons","Strong communicator":"{Name} communicates clearly with peers and staff","Leader":"{Name} shows leadership and helps bring others along","Great team member":"{Name} is a great team member who supports those around {obj}","Personable":"{Name} is personable and a positive presence in the group","Friendly":"{Name} is friendly and well-liked by {pos} peers"};
const AREA_S={"Build fundamental skills & fitness":"keep building {pos} fundamental skills and base fitness, particularly strength","More consistent participation & effort":"bring {pos} participation and effort more consistently, no matter the activity","Capable of more than they realise":"recognise that {subj} {be} capable of more than {subj} sometimes gives {refl} credit for","Looking to become a leader":"look to take on more of a leadership role, using {pos} experience to help others","Self-management, discipline & focus":"strengthen {pos} self-management, discipline and focus","Organisation":"stay on top of {pos} organisation and preparation","Push harder / more consistently":"push {refl} a little harder and more consistently","Social skills & teamwork":"keep developing {pos} social skills and how {subj} works within a team","Grow as a leader — get the best from the team":"continue to grow as a leader and learn how to get the best out of {pos} teammates","Push regardless of situation; unafraid of mistakes":"keep pushing regardless of the situation, and not be afraid to make mistakes","Set higher standards":"set higher standards for {refl}","Seek challenges outside the comfort zone":"look for challenges that push {obj} outside {pos} comfort zone to develop {pos} skills and fitness"};
function P(name,p){const S={they:{s:'they',o:'them',pos:'their',refl:'themselves',be:'are'},he:{s:'he',o:'him',pos:'his',refl:'himself',be:'is'},she:{s:'she',o:'her',pos:'her',refl:'herself',be:'is'}}[p]||{s:'they',o:'them',pos:'their',refl:'themselves',be:'are'};const cap=w=>w.charAt(0).toUpperCase()+w.slice(1);return {Name:name,subj:S.s,Subj:cap(S.s),obj:S.o,pos:S.pos,Pos:cap(S.pos),refl:S.refl,be:S.be,Be:cap(S.be)};}
function fill(t,c){return t.replace(/\{(\w+)\}/g,(m,k)=>k in c?c[k]:m).replace(/\s+([.,;])/g,'$1').replace(/\s{2,}/g,' ').replace(/(^|[.!?]\s+)([a-z])/g,(m,p,l)=>p+l.toUpperCase()).trim();}
/* ====== pronoun best-guess: Canvas pronouns -> teacher-comment scan -> name map -> fallback ====== */
const NAME_F=new Set("emma olivia ava sophia isabella mia charlotte amelia harper evelyn abigail emily ella scarlett grace chloe victoria zoe lily hannah lucy layla aria ellie nora hazel zoey mila aurora addison eleanor stella natalie leah hailey sarah anna eliza eva caroline carolin martha vanessa elizabeth selin selina ivy fia bia ana livia laia moa rebecka gracie tia addy amara vritti aliyah cameron sukanya shulini fia maya sofia clara julia laura lena marie anna katharina lea hanna lara nina sara mariam aisha fatima yara nour"
.split(/\s+/));
const NAME_M=new Set("liam noah oliver elijah james william benjamin lucas henry alexander mason michael ethan daniel jacob logan jackson sebastian jack aiden owen samuel matthew joseph david john wyatt luke isaac gabriel anthony dylan leo lincoln jaxon asher christopher max charlie oscar vince albert konstantin damian linus fabio jihao nathan vikrant stavan bayne niclas attila angel chris eamon sean fletcher simon ian eli nic daniel juwon bronson aras jayden felix paul jonas lukas finn tim tom ben jan erik anton mateo diego pablo omar ali yusuf adam"
.split(/\s+/));
function guessPron(name,rows){
 const pr=(rows.find(r=>r.pronouns)||{}).pronouns;
 if(pr){const p=pr.toLowerCase();if(p.includes('she'))return 'she';if(p.includes('they'))return 'they';if(p.includes('he'))return 'he';}
 const txt=rows.map(r=>r.comments||'').join(' ').toLowerCase();
 const he=(txt.match(/\b(he|him|his)\b/g)||[]).length, she=(txt.match(/\b(she|her|hers)\b/g)||[]).length;
 if(he>she&&he>0)return 'he'; if(she>he&&she>0)return 'she';
 const first=(name||'').trim().split(/\s+/)[0].toLowerCase();
 if(NAME_M.has(first))return 'he'; if(NAME_F.has(first))return 'she';
 return 'they';
}
let ROSTER={};
async function loadRoster(){try{const r=await fetch('roster.csv',{cache:'no-store'});if(!r.ok)return;ROSTER=parseRoster(await r.text());applyRoster();}catch(_){}}
function parseRoster(t){const m={};(t||'').split(/\r?\n/).forEach(line=>{const p=line.split(/[,\t;|]/).map(x=>x.trim());if(p.length<2)return;const first=(p[0]||'').toLowerCase();if(!first||/^(name|first ?name|student)$/.test(first))return;const g=(p.slice(1).join(' ')||'').toLowerCase();let pr=null;if(/^(f|female|girl|w)$/.test(g)||/\b(she|her)\b/.test(g))pr='she';else if(/^(m|male|boy)$/.test(g)||/\b(he|him)\b/.test(g))pr='he';else if(/^(x|nb|nonbinary|non-binary)$/.test(g)||/\b(they|them)\b/.test(g))pr='they';if(pr)m[first]=pr;});return m;}
function applyRoster(){if(!ORDER||!ORDER.length||!Object.keys(ROSTER).length)return;let changed=false;ORDER.forEach(k=>{const st=DATA[k];const first=(st.name||'').trim().split(/\s+/)[0].toLowerCase();if(ROSTER[first]){if(ROSTER[first]!==st.pron&&st.comment)st.comment='';st.pron=ROSTER[first];changed=true;}});if(changed){try{renderList();}catch(_){}if(cur){try{renderEditor();}catch(_){}}}}
function num(v){const m=String(v).match(/-?\d+(\.\d+)?/);return m?parseFloat(m[0]):null;}
function suggestGrade(rows){const g=[];rows.forEach(r=>{const gr=(r.grade||'').toLowerCase();if(gr==='complete'||gr==='incomplete'||gr==='')return;const n=num(r.grade);if(n!=null&&n>=1&&n<=7)g.push(Math.round(n));});if(!g.length){rows.forEach(r=>{const n=num(r.score);if(n!=null&&n>=1&&n<=7)g.push(Math.round(n));});}if(!g.length)return '';const cnt={};g.forEach(x=>cnt[x]=(cnt[x]||0)+1);return +Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]||b-a)[0];}
function evText(rows){return rows.map(r=>r.comments+' '+r.criteria).join(' ').toLowerCase();}
function sStr(rows,grade){const t=evText(rows),o=new Set();if(/participat|engage|effort/.test(t))o.add("Participates actively");if(/self-manage|self manage|independent|organis|prepared/.test(t))o.add("Self-management");if(/improv|retest|progress/.test(t))o.add("Improvement in skills & fitness");if(/feedback|coachable|teachable|reflect/.test(t))o.add("Teachable — wants to learn & improve");if(/injury|resilien|grit|persever/.test(t))o.add("Grit / perseverance");if(/team|collaborat|cooperat/.test(t))o.add("Great team member");if(/communicat/.test(t))o.add("Strong communicator");if(/competitive/.test(t))o.add("Competitive");if(/athletic|natural/.test(t))o.add("Naturally athletic");if(/fundamental|technique|skilful|skillful/.test(t))o.add("Strong fundamental skills");if(/confidence/.test(t))o.add("Improvement in confidence");if(/friendly|personable|kind/.test(t))o.add("Personable");if(grade>=6)o.add("Hard working");return [...o].slice(0,5);}
function sArea(rows,grade){const t=evText(rows),o=new Set();if(/intensit|harder|push/.test(t))o.add("Push harder / more consistently");if(/inconsistent|consistenc/.test(t))o.add("More consistent participation & effort");if(/deliver|leadership|lead /.test(t))o.add("Grow as a leader — get the best from the team");if(/confidence|believe|capable/.test(t))o.add("Capable of more than they realise");if(/organis/.test(t))o.add("Organisation");if(/strength|conditioning|speed|power|fitness/.test(t))o.add("Build fundamental skills & fitness");if(/social|team/.test(t))o.add("Social skills & teamwork");if(/focus|distract/.test(t))o.add("Self-management, discipline & focus");if(/standard/.test(t))o.add("Set higher standards");if(/comfort|challenge/.test(t))o.add("Seek challenges outside the comfort zone");if(grade&&grade<=4){o.add("Build fundamental skills & fitness");o.add("Push harder / more consistently");}return [...o].slice(0,3);}
function band(g){return g>=6?'hi':g>=4?'mid':g>=1?'lo':'mid';}
const OPEN={hi:"{Name} has had a consistently strong semester in physical education and performs at a good level across {pos} units.",mid:"{Name} has made solid progress in physical education this semester.",lo:"{Name} has found parts of physical education challenging this semester but has shown genuine effort."};
function quickDraft(st){const c=P((st.name||'').split(' ')[0]||'[Name]',st.pron);const g=st.grade?+st.grade:0;const parts=[fill(OPEN[band(g)],c)];[...st.strengths].slice(0,3).forEach(s=>{if(STR_S[s])parts.push(fill(STR_S[s]+'.',c));});const ar=[...st.areas].slice(0,2).map(a=>AREA_S[a]).filter(Boolean);if(ar.length===1)parts.push(fill('To move toward the top of the range, {Name} should '+ar[0]+'.',c));else if(ar.length>1)parts.push(fill('To keep progressing, {Name} should '+ar[0]+', and '+ar[1]+'.',c));if((st.note||'').trim())parts.push(fill(st.note.trim().replace(/\.$/,'')+'.',c));parts.push(fill('With this commitment, {Name} {be} well placed to keep building next semester.',c));return parts.join(' ');}

/* ====== de-identify + Claude call ====== */
function scrub(text,name){if(!name)return text;let t=text;name.split(/\s+/).filter(p=>p.length>1).forEach(p=>{t=t.replace(new RegExp(p.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),'[NAME]');});return t;}
function buildUserMsg(st){const isAdmin=t=>/no submission|did ?n'?o?t? ?submit|have ?n'?t submitted|has ?n'?t submitted|needs this|asap|please (submit|hand|complete)|missing (the |their |your )?(submission|work|assignment)|see something attach|no work (submitted|attached)/i.test(t||'');const ev=st.rows.map(r=>{const cmt=isAdmin(r.comments)?'':(r.comments||'');const zero=(r.score===''||r.score==null||String(r.score)==='0');if(!r.criteria&&!cmt&&zero)return null;const bits=[];if(r.score!=null&&r.score!==''&&String(r.score)!=='0')bits.push('score '+r.score);if(r.criteria)bits.push('criteria — '+r.criteria);if(cmt)bits.push('teacher comment — '+cmt);return bits.length?`• [${r.date||'date n/a'}] ${r.assignment}: ${bits.join('; ')}`:null;}).filter(Boolean).join('\n');
 const pron={they:'they/them',he:'he/him',she:'she/her'}[st.pron]||'they/them';
 const tagBlock=st.tagsEdited
   ?`The teacher has CHOSEN these tags — use them EXACTLY, do not add, drop or swap any. Write the comment from them and return them unchanged in your JSON.\nStrengths (use exactly): ${[...st.strengths].join(' | ')||'(none)'}\nAreas to improve (use exactly): ${[...st.areas].join(' | ')||'(none)'}`
   :`Choose STRENGTHS only from this list (exact wording):\n${STRENGTHS.join(' | ')}\n\nChoose AREAS only from this list (exact wording):\n${AREAS.join(' | ')}`;
 return `Grade (1–7): ${st.grade||'(not set)'}\nPronouns: ${pron}\nTeacher note (optional, weave in if given): ${st.note||'(none)'}\n\n${tagBlock}\n\nEvidence from across the year, in date order earliest-to-latest (the teacher's own scores, rubric levels with the selected band description in [brackets], and written comments; student name removed):\n${scrub(ev,st.name)||'(no detailed evidence)'}`;}
async function callClaude(st){
 if(!KEY)throw new Error('Enter your Anthropic API key at the top first.');
 const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:MODEL,max_tokens:500,system:SYSTEM,messages:[{role:'user',content:buildUserMsg(st)}]})});
 if(!res.ok){let m='HTTP '+res.status;try{const e=await res.json();m=(e.error&&e.error.message)||m;}catch(_){}if(res.status===401)m='Key rejected (401). Check the key and that billing is set up.';if(res.status===429)m='Rate limit (429). Slow down or wait a moment.';throw new Error(m);}
 const data=await res.json();
 let txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
 const first=(st.name||'').split(' ')[0]||'[NAME]';
 txt=txt.replace(/```json|```/g,'').trim();
 let strengths=null,areas=null,comment=null;
 const s=txt.indexOf('{'),e=txt.lastIndexOf('}');const jstr=(s>=0&&e>s)?txt.slice(s,e+1):txt;
 try{const j=JSON.parse(jstr);if(j&&typeof j==='object'){if(Array.isArray(j.strengths))strengths=j.strengths.filter(x=>STRENGTHS.includes(x));if(Array.isArray(j.areas))areas=j.areas.filter(x=>AREAS.includes(x));if(typeof j.comment==='string')comment=j.comment;}}catch(_){}
 if(comment==null){const m=jstr.match(/"comment"\s*:\s*"((?:[^"\\]|\\.)*)"/);if(m){try{comment=JSON.parse('"'+m[1]+'"');}catch(_){comment=m[1];}}}
 if(comment==null)comment=txt;
 comment=String(comment).replace(/\[NAME\]/g,first).trim();
 return {strengths,areas,comment};
}
function applyResult(st,res){if(!st.tagsEdited){if(res.strengths&&res.strengths.length)st.strengths=new Set(res.strengths);if(res.areas&&res.areas.length)st.areas=new Set(res.areas);}if(res.comment!=null)st.comment=res.comment;}

/* ====== state + parse ====== */
function parseCSV(text){const rows=[];let i=0,f='',row=[],q=false;while(i<text.length){const c=text[i];if(q){if(c=='"'){if(text[i+1]=='"'){f+='"';i++;}else q=false;}else f+=c;}else{if(c=='"')q=true;else if(c==','){row.push(f);f='';}else if(c=='\n'||c=='\r'){if(c=='\r'&&text[i+1]=='\n')i++;if(f!==''||row.length){row.push(f);rows.push(row);row=[];f='';}}else f+=c;}i++;}if(f!==''||row.length){row.push(f);rows.push(row);}const head=rows.shift().map(h=>h.trim());return rows.map(r=>{const o={};head.forEach((h,j)=>o[h]=(r[j]||'').trim());return o;});}
let DATA={},ORDER=[],cur=null,KEY='';
let SECTION='',SECTIONS=[];
function lastKey(st){if(st&&st.sortable)return st.sortable.toLowerCase();const p=((st&&st.name)||'').trim().split(/\s+/);return (p.length>1?p[p.length-1]+', '+p.slice(0,-1).join(' '):((st&&st.name)||'')).toLowerCase();}
function vis(){return SECTION?ORDER.filter(k=>((DATA[k].section)||'')===SECTION):ORDER;}
function renderSecSel(){const sel=document.getElementById('secSel');if(!sel)return;if(SECTIONS.length>1){sel.style.display='';sel.innerHTML='<option value="">All sections</option>'+SECTIONS.map(function(s){var v=s.replace(/"/g,'&quot;');return '<option value="'+v+'">'+s+'</option>';}).join('');sel.value=SECTION;}else{sel.style.display='none';}}
function buildData(){DATA={};ORDER=[];ROWS.forEach(r=>{const k=r.sid||r.name;if(!k)return;(DATA[k]=DATA[k]||{key:k,name:r.name||String(k),section:r.section||'',sortable:r.sortable||'',rows:[]}).rows.push(r);});ORDER=Object.keys(DATA).sort((a,b)=>lastKey(DATA[a]).localeCompare(lastKey(DATA[b])));SECTIONS=[...new Set(ORDER.map(k=>DATA[k].section).filter(Boolean))].sort();if(!SECTION||!SECTIONS.includes(SECTION))SECTION=SECTIONS.length>1?SECTIONS[0]:'';renderSecSel();ORDER.forEach(k=>{const st=DATA[k];st.rows.sort((a,b)=>{const da=a.date||'',db=b.date||'';if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return da.localeCompare(db);});const g=suggestGrade(st.rows);st.pron=guessPron(st.name,st.rows);st.grade=g;st.strengths=new Set(sStr(st.rows,g));st.areas=new Set(sArea(st.rows,g));st.note='';st.reviewed=false;st.comment='';st.tagsEdited=false;});applyRoster();}
function lowCrit(s){return (s||'').replace(/([^:|]+):\s*([0-9.]+)/g,(m,l,n)=>parseFloat(n)<=3?`<b class="low">${l.trim()}: ${n}</b>`:`${l.trim()}: ${n}`);}
function renderList(){const el=document.getElementById('list');el.innerHTML='';const V=vis();let done=0;V.forEach(k=>{const st=DATA[k];if(st.reviewed)done++;const d=document.createElement('div');d.className='srow'+(k===cur?' active':'')+(st.reviewed?' done':'');d.innerHTML=`<span class="nm">${st.name}</span><span class="tick">✓</span><span class="g ${st.grade?'set':''}">${st.grade||'–'}</span>`;d.onclick=()=>{cur=k;document.getElementById('summary').classList.remove('show');document.getElementById('editor').style.display='';document.getElementById('toggleView').textContent='Full-class table';renderList();renderEditor();};el.appendChild(d);});document.getElementById('meta').textContent=ORDER.length?`${V.length} student${V.length===1?'':'s'}${SECTION?' · '+SECTION:''} · ${done} reviewed`:'no class loaded';}
function chip(label,on,sug,cls,fn){const c=document.createElement('span');c.className='chip '+cls+(on?' on':'')+(sug&&!on?' sug':'');c.textContent=label;c.onclick=fn;return c;}
function renderEditor(){const st=DATA[cur];if(!st){return;}const e=document.getElementById('editor');let ev='<table class="evgrid"><tr><th>Date</th><th>Assessment</th><th>Score</th><th>Criteria</th></tr>';st.rows.forEach(r=>{if(!r.score&&!r.criteria&&!r.comments)return;ev+=`<tr><td>${r.date||''}</td><td>${r.assignment}</td><td>${r.grade||r.score||''}</td><td class="crit">${lowCrit(r.criteria)}</td></tr>`;});ev+='</table>';let cm='';st.rows.forEach(r=>{if(r.comments)cm+=`<div class="cmt">${r.comments.replace(/\s*\/\/\s*/g,' — ')}</div>`;});const sug=new Set(sStr(st.rows,st.grade)),suga=new Set(sArea(st.rows,st.grade));
e.innerHTML=`<div class="card"><h2>${st.name} — evidence <span class="muted">(your scores & comments — source of truth)</span></h2>${ev}${cm||'<div class="muted" style="margin-top:8px">No written comments on file.</div>'}</div>
<div class="card"><div style="display:flex;gap:22px;flex-wrap:wrap;align-items:end"><div><span class="lab">Grade (1–7)</span><select id="grade"></select></div><div><span class="lab">Pronoun${st.pron==='they'?' <span style="color:#c0392b;font-weight:600">· verify</span>':''}</span><select id="pron"></select></div><div><span class="lab">Status</span><br><button class="b-ghost" id="rev">${st.reviewed?'✓ Reviewed':'Mark reviewed'}</button></div></div>
<div class="subhead"><span class="t">Strengths</span><span class="tag">${st.tagsEdited?'your picks · locked':'suggested'}</span>${st.tagsEdited?' <a href="#" id="repick" style="font-size:12px;color:#888;text-decoration:underline">↺ let Claude re-pick</a>':''}</div><div class="chips" id="strchips"></div>
<div class="subhead"><span class="t">Areas to improve</span><span class="tag">${st.tagsEdited?'your picks · locked':'suggested'}</span></div><div class="chips" id="areachips"></div>
<div style="margin-top:14px"><span class="lab">Personal note (optional)</span><textarea id="note" rows="2" placeholder="Anything specific to weave in.">${st.note||''}</textarea></div></div>
<div class="card"><h2>Comment</h2><textarea id="comment" placeholder="Press Generate (Claude) to draft in your voice.">${st.comment||''}</textarea>
<div class="genbar"><button class="b-lime" id="gen">Generate · Claude</button><button class="b-ghost" id="quick">Quick draft (offline)</button><span class="status" id="status"></span><span class="count" id="count"></span></div>
<div class="contract"><span><span class="dot g-grn"></span>green = your evidence</span><span><span class="dot g-amb"></span>amber = grade + tags</span><span><span class="dot g-red"></span>red = nothing invented; name sent as [NAME]</span></div></div>`;
const gs=document.getElementById('grade');['','1','2','3','4','5','6','7'].forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v||'–';if(String(st.grade)===v)o.selected=true;gs.appendChild(o);});gs.onchange=()=>{st.grade=gs.value?+gs.value:'';renderList();};
const ps=document.getElementById('pron');[['they','they/them'],['he','he/him'],['she','she/her']].forEach(([v,l])=>{const o=document.createElement('option');o.value=v;o.textContent=l;if(st.pron===v)o.selected=true;ps.appendChild(o);});ps.onchange=()=>{st.pron=ps.value;};
const sc=document.getElementById('strchips');STRENGTHS.forEach(s=>sc.appendChild(chip(s,st.strengths.has(s),sug.has(s),'str',()=>{st.strengths.has(s)?st.strengths.delete(s):st.strengths.add(s);st.tagsEdited=true;renderEditor();})));
const ac=document.getElementById('areachips');AREAS.forEach(a=>ac.appendChild(chip(a,st.areas.has(a),suga.has(a),'area',()=>{st.areas.has(a)?st.areas.delete(a):st.areas.add(a);st.tagsEdited=true;renderEditor();})));
const rp=document.getElementById('repick');if(rp)rp.onclick=ev2=>{ev2.preventDefault();st.tagsEdited=false;renderEditor();};
document.getElementById('note').oninput=x=>st.note=x.target.value;
document.getElementById('comment').oninput=x=>{st.comment=x.target.value;updateCount();};
document.getElementById('quick').onclick=()=>{st.comment=quickDraft(st);document.getElementById('comment').value=st.comment;updateCount();};
document.getElementById('gen').onclick=async()=>{const s=document.getElementById('status'),b=document.getElementById('gen');b.disabled=true;s.className='status busy';s.textContent='Claude is reading the evidence…';try{const res=await callClaude(st);applyResult(st,res);renderEditor();const s2=document.getElementById('status');if(s2){s2.className='status ok';s2.textContent='✓ tags chosen + comment drafted';}}catch(err){s.className='status err';s.textContent=err.message;b.disabled=false;}};
document.getElementById('rev').onclick=()=>{st.reviewed=!st.reviewed;renderList();renderEditor();};
updateCount();}
function updateCount(){const st=DATA[cur];if(!st)return;const t=(st.comment||'').trim();const w=t?t.split(/\s+/).length:0,s=t?(t.match(/[.!?]+/g)||[]).length:0;const el=document.getElementById('count');if(el)el.textContent=`${w} words · ${s} sentences`;}
function renderSummary(){const el=document.getElementById('summary');let h='<table class="stable"><tr><th>Student</th><th>Grade</th><th>Strengths</th><th>Areas</th><th>Comment</th></tr>';vis().forEach(k=>{const st=DATA[k];h+=`<tr data-k="${k}"><td><b>${st.name}</b></td><td class="gg">${st.grade||'–'}</td><td>${[...st.strengths].map(s=>`<span class="pill">${s}</span>`).join('')}</td><td>${[...st.areas].map(s=>`<span class="pill">${s}</span>`).join('')}</td><td class="muted">${(st.comment||'—').slice(0,80)}…</td></tr>`;});h+='</table>';el.innerHTML=h;el.querySelectorAll('tr[data-k]').forEach(tr=>tr.onclick=()=>{cur=tr.dataset.k;document.getElementById('toggleView').click();renderList();renderEditor();});}

/* ====== top actions ====== */
document.getElementById('key').oninput=e=>{KEY=e.target.value.trim();document.getElementById('keyok').classList.toggle('hide',!KEY);};
document.getElementById('loadData').onclick=()=>document.getElementById('dataFile').click();
document.getElementById('dataFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{ROWS=f.name.endsWith('.json')?JSON.parse(r.result):parseCSV(r.result);buildData();cur=ORDER[0];renderList();renderEditor();setTimeout(()=>{if(KEY)draftAll();else alert('Class loaded with best-guess grades, tags and pronouns. Add your Anthropic key above and it will auto-draft — or press “Draft all · Claude”.');},150);}catch(err){alert('Could not read that file: '+err.message);}};r.readAsText(f);};
document.getElementById('toggleView').onclick=()=>{if(!ORDER.length)return;const s=document.getElementById('summary'),ed=document.getElementById('editor'),b=document.getElementById('toggleView');if(s.classList.contains('show')){s.classList.remove('show');ed.style.display='';b.textContent='Full-class table';}else{renderSummary();s.classList.add('show');ed.style.display='none';b.textContent='Back to student';}};
async function draftAll(){if(!ORDER.length)return;if(!KEY){alert('Add your Anthropic key above first.');return;}const b=document.getElementById('genAll');b.disabled=true;let done=0,fail=0;const V=vis();for(const k of V){const st=DATA[k];if(st.comment&&st.comment.trim()){done++;continue;}b.textContent=`Drafting ${done+fail+1}/${V.length}…`;try{applyResult(st,await callClaude(st));done++;}catch(err){fail++;if(String(err.message).includes('429')){await new Promise(r=>setTimeout(r,5000));try{applyResult(st,await callClaude(st));done++;fail--;}catch(_){}}}renderList();await new Promise(r=>setTimeout(r,700));}b.textContent='Draft all · Claude';b.disabled=false;if(cur)renderEditor();if(document.getElementById('summary').classList.contains('show'))renderSummary();alert(`Done. ${done} drafted${fail?`, ${fail} failed (open them and retry)`:''}.`);}
document.getElementById('genAll').onclick=draftAll;
document.getElementById('secSel').onchange=function(e){SECTION=e.target.value;if(cur&&DATA[cur]&&SECTION&&((DATA[cur].section)||'')!==SECTION){cur=vis()[0]||null;}renderList();if(document.getElementById('summary').classList.contains('show'))renderSummary();else if(cur)renderEditor();};
function bulkPronouns(){if(!ORDER.length){alert('Load a class first.');return;}const t=prompt('Paste your roster, one per line as "First name, gender" (gender = M / F / X, or he / she / they). Matched by first name. Any student whose pronoun changes has their draft cleared so the next "Draft all" redraws just those.');if(!t)return;const map={};t.split(/[\n;]+/).forEach(line=>{const parts=line.split(/[,\t|]/).map(x=>x.trim()).filter(Boolean);if(parts.length<2)return;const first=parts[0].toLowerCase();const g=parts.slice(1).join(' ').toLowerCase();let p=null;if(/^(f|female|girl|w|she|her)$/.test(g)||/\b(she|her)\b/.test(g))p='she';else if(/^(m|male|boy|he|him)$/.test(g)||/\b(he|him)\b/.test(g))p='he';else if(/^(x|nb|nonbinary|non-binary|they|them)$/.test(g)||/\b(they|them)\b/.test(g))p='they';if(p)map[first]=p;});let changed=0,matched=0;ORDER.forEach(k=>{const st=DATA[k];const first=(st.name||'').trim().split(/\s+/)[0].toLowerCase();if(map[first]){matched++;if(map[first]!==st.pron){st.pron=map[first];if(st.comment)st.comment='';changed++;}}});renderList();if(cur)renderEditor();alert(`Matched ${matched} student(s). ${changed} pronoun(s) changed — their drafts were cleared, so run "Draft all" to redraft just those.`);}
document.getElementById('setPron').onclick=bulkPronouns;
loadRoster();
document.getElementById('exportBtn').onclick=()=>{if(!ORDER.length)return;const esc=v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`;const cols=['name','section','grade','pronoun','strengths','areas','comment'];const rows=vis().map(k=>{const st=DATA[k];return [st.name,st.section||'',st.grade,st.pron,[...st.strengths].join('; '),[...st.areas].join('; '),st.comment];});const csv=[cols.join(',')].concat(rows.map(r=>r.map(esc).join(','))).join('\n');dl(`G9_reports${SECTION?'_'+SECTION.replace(/\W+/g,''):''}.csv`,csv,'text/csv');};
document.getElementById('saveBtn').onclick=()=>{if(!ORDER.length)return;const o={};ORDER.forEach(k=>{const st=DATA[k];o[k]={name:st.name,section:st.section||'',sortable:st.sortable||'',grade:st.grade,pron:st.pron,strengths:[...st.strengths],areas:[...st.areas],note:st.note,comment:st.comment,reviewed:st.reviewed,rows:st.rows};});dl('G9_progress.json',JSON.stringify(o),'application/json');};
document.getElementById('loadProg').onclick=()=>document.getElementById('jsonFile').click();
document.getElementById('jsonFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const o=JSON.parse(r.result);DATA={};ORDER=Object.keys(o);ORDER.forEach(k=>{DATA[k]=Object.assign({key:k},o[k]);DATA[k].strengths=new Set(o[k].strengths);DATA[k].areas=new Set(o[k].areas);if(!DATA[k].section&&DATA[k].rows&&DATA[k].rows[0])DATA[k].section=DATA[k].rows[0].section||'';if(!DATA[k].sortable&&DATA[k].rows&&DATA[k].rows[0])DATA[k].sortable=DATA[k].rows[0].sortable||'';});ORDER.sort((a,b)=>lastKey(DATA[a]).localeCompare(lastKey(DATA[b])));SECTIONS=[...new Set(ORDER.map(k=>DATA[k].section).filter(Boolean))].sort();if(!SECTION||!SECTIONS.includes(SECTION))SECTION=SECTIONS.length>1?SECTIONS[0]:'';renderSecSel();cur=vis()[0]||ORDER[0];renderList();renderEditor();};r.readAsText(f);};
function dl(name,text,type){const b=new Blob([text],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
</script></body></html>
